services:
  - type: worker
    name: exitant-infinite-hl
    runtime: image
    plan: starter
    region: oregon
    numInstances: 1
    image:
      url: docker.io/exitant/exitant-infinite-hl:5
    envVars:
      - key: HYPE_WALLET_API
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
